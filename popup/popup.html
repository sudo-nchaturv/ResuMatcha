<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>ResuMatcha</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- ── SETTINGS SCREEN ───────────────────────────────── -->
  <div id="settingsScreen" class="screen hidden">
    <div class="hdr">
      <h1>⚙ Setup</h1>
      <p class="sub">Configure your LLM provider to use ResuMatcha.</p>
    </div>
    <label>Provider</label>
    <select id="s-provider">
      <option value="gemini">Gemini</option>
      <option value="openrouter">OpenRouter / OpenAI-style</option>
    </select>
    <label>Model</label>
    <input id="s-model" type="text" placeholder="gemini-1.5-flash" />
    <label>API Key</label>
    <input id="s-apiKey" type="password" placeholder="Paste your key here…" />
    <div id="s-endpointRow">
      <label>Endpoint</label>
      <input id="s-endpoint" type="text" placeholder="https://api.openrouter.ai/v1/chat/completions" />
    </div>
    <button id="s-saveBtn">Verify &amp; Save</button>
    <p id="s-status" class="msg"></p>
    <p class="hint">Key is stored locally in this browser profile only.</p>
  </div>

  <!-- ── MAIN SCREEN ───────────────────────────────────── -->
  <div id="mainScreen" class="screen hidden">
    <div class="hdr row-between">
      <h1>ResuMatcha</h1>
      <button id="mainSettingsBtn" class="icon-btn" title="Settings">⚙</button>
    </div>

    <div class="card">
      <div class="card-lbl">Your CV</div>
      <p id="cvStatus" class="muted small">No CV uploaded yet</p>
      <label class="file-btn">
        📄 Upload / Replace CV (.txt)
        <input id="cvInput" type="file" accept=".txt,text/plain" />
      </label>
    </div>

    <div class="card">
      <div class="card-lbl">Current Page</div>
      <p id="currentUrl" class="url-text small">—</p>
    </div>

    <button id="extractBtn" disabled>Extract JD &amp; Analyze with AI</button>
    <p id="extractStatus" class="msg"></p>
  </div>

  <!-- ── RESULTS SCREEN ────────────────────────────────── -->
  <div id="resultsScreen" class="screen hidden">
    <div class="hdr row-between">
      <button id="backBtn" class="icon-btn">←</button>
      <h1>Analysis</h1>
      <button id="resSettingsBtn" class="icon-btn" title="Settings">⚙</button>
    </div>

    <div class="job-card">
      <div id="resJobTitle" class="job-title">—</div>
      <div id="resCompany" class="job-co"></div>
      <p id="resUrl" class="url-text small"></p>
    </div>

    <div class="scores-row">
      <div class="score-box">
        <span id="atsVal" class="score-num">—</span>
        <span class="score-lbl">ATS Score</span>
      </div>
      <div class="score-box">
        <span id="kwVal" class="score-num">—</span>
        <span class="score-lbl">Keyword Match</span>
      </div>
    </div>

    <p id="matchSummary" class="summary"></p>

    <div class="card">
      <div class="card-lbl">Missing Keywords</div>
      <div id="kwChips" class="chips"></div>
    </div>

    <button id="coverBtn">✉ Generate Cover Letter</button>
    <div id="coverSection" class="hidden">
      <textarea id="letter" rows="5" placeholder="Generated cover letter…"></textarea>
      <button id="copyBtn">Copy</button>
    </div>
    <p id="coverStatus" class="msg"></p>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
