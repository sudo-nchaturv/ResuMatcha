<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResuMatcha Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: 20px auto;
      padding: 0 12px;
      background: #0f172a;
      color: #e2e8f0;
    }

    label {
      display: block;
      margin: 12px 0 4px;
      font-size: 13px;
      color: #94a3b8;
    }

    input,
    select {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      box-sizing: border-box;
      font-size: 13px;
    }

    button {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: #1d4ed8;
    }

    small {
      color: #475569;
      font-size: 11px;
    }

    #status {
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    h1 {
      font-size: 20px;
    }
  </style>
</head>

<body>
  <h1>ResuMatcha Settings</h1>
  <label for="provider">Provider</label>
  <select id="provider">
    <option value="gemini">Gemini</option>
    <option value="openrouter">OpenRouter / OpenAI-style</option>
  </select>

  <label for="mode">Mode</label>
  <select id="mode">
    <option value="direct">Direct (store key locally)</option>
    <option value="proxy">Proxy (backend token flow)</option>
  </select>

  <div id="endpointRow">
    <label for="endpoint">Endpoint (OpenAI-compatible)</label>
    <input id="endpoint" type="text" placeholder="https://api.openrouter.ai/v1/chat/completions" />
  </div>

  <label for="model">Model</label>
  <input id="model" type="text" placeholder="gemini-1.5-flash or gpt-4o-mini" />

  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="Paste your key here" />
  <small>Stored in chrome.storage.local. Keep your device secure.</small>

  <br />
  <button id="save">Verify &amp; Save</button>
  <p id="status"></p>

  <script type="module" src="settings.js"></script>
</body>

</html>
