<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeMatcher Settings</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 640px; margin: 20px auto; padding: 0 12px; }
    label { display:block; margin: 10px 0 4px; }
    input, select { width: 100%; padding: 8px; }
    button { margin-top: 12px; padding: 10px 14px; }
    small { color: #666; }
  </style>
</head>
<body>
  <h1>ResumeMatcher Settings</h1>
  <label for="provider">Provider</label>
  <select id="provider">
    <option value="openrouter">OpenRouter / OpenAI-style</option>
    <option value="gemini">Gemini</option>
  </select>

  <label for="mode">Mode</label>
  <select id="mode">
    <option value="direct">Direct (store key locally)</option>
    <option value="proxy">Proxy (backend token flow)</option>
  </select>

  <label for="endpoint">Endpoint (OpenAI-compatible)</label>
  <input id="endpoint" type="text" placeholder="https://api.openrouter.ai/v1/chat/completions" />

  <label for="model">Model</label>
  <input id="model" type="text" placeholder="gpt-4o-mini or gemini-1.5-flash" />

  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="sk-..." />
  <small>Stored in chrome.storage.local. Keep your device secure.</small>

  <button id="save">Save</button>
  <p id="status"></p>

  <script type="module">
    const provider = document.getElementById('provider');
    const mode = document.getElementById('mode');
    const endpoint = document.getElementById('endpoint');
    const model = document.getElementById('model');
    const apiKey = document.getElementById('apiKey');
    const status = document.getElementById('status');

    const store = await chrome.storage.local.get(['settings']);
    const s = store.settings || {};
    provider.value = s.provider || 'openrouter';
    mode.value = s.mode || 'direct';
    endpoint.value = s.endpoint || 'https://api.openrouter.ai/v1/chat/completions';
    model.value = s.model || 'gpt-4o-mini';
    apiKey.value = s.apiKey || '';

    document.getElementById('save').addEventListener('click', async () => {
      await chrome.storage.local.set({
        settings: {
          provider: provider.value,
          mode: mode.value,
          endpoint: endpoint.value,
          model: model.value,
          apiKey: apiKey.value
        }
      });
      status.textContent = 'Saved.';
    });
  </script>
</body>
</html>
